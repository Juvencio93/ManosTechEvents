<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cativo - Acesso Wi-Fi</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(ellipse at 30% 20%, #0d1a2d 0%, #040810 70%); display: flex;">
    <div class="portal-card" id="portalCard" style="background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 460px; text-align: center;">
        <div class="portal-logo-grande" id="portalLogoGrande">🎪</div>
        <div class="carrossel-container" id="carrosselContainer"><div class="carrossel-faixa" id="carrosselFaixa"></div></div>
        <h3>Conecte-se ao Wi-Fi</h3>
        <div class="input-group"><label>Nome</label><input type="text" id="portalNome"></div>
        <div class="input-group"><label>E-mail</label><input type="email" id="portalEmail"></div>
        <div class="input-group">
            <label>WhatsApp (com código do país)</label>
            <div class="phone-row">
                <div class="custom-select-wrapper">
                    <div class="custom-select" id="customSelect">🇧🇷 +55</div>
                    <div class="custom-options" id="customOptions"></div>
                </div>
                <input type="text" id="portalWhatsApp" placeholder="(DDD) 9 9999-9999" maxlength="20">
            </div>
            <div class="error-msg" id="erroWhatsapp">Número inválido para o país selecionado.</div>
        </div>
        <div class="lgpd-box">
            <label><input type="checkbox" id="portalLGPD"> <span>Autorizo a coleta e o uso dos meus dados pessoais, de acordo com a LGPD, para acesso à rede Wi-Fi, envio de comunicações sobre eventos futuros, promoções e novidades da Manos Tech e de seus parceiros.</span></label>
            <div class="lgpd-resumo">📌 Seus dados poderão ser utilizados para marketing e divulgação de eventos. Você pode solicitar a remoção a qualquer momento.</div>
            <div class="lgpd-error" id="lgpdError">⚠️ É necessário aceitar a política de privacidade.</div>
        </div>
        <button class="btn btn-primary" onclick="conectar()">🔓 Acessar Internet</button>
        <button class="btn btn-ghost btn-sm" style="margin-top:12px;width:100%;" onclick="window.close()">Fechar</button>
    </div>

    <script>
        // ---------- Configuração Supabase ----------
        const SUPABASE_URL = 'https://uojdbrjxeapzfrulcipr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ZGrmIWRubt_0MgPi_a4mgQ_RNYdNflM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ---------- Lista de países (mesma do admin) ----------
        const countries = [
            { code: '93', label: '🇦🇫 +93', name: '🇦🇫 Afghanistan (افغانستان)+93' },
            { code: '355', label: '🇦🇱 +355', name: '🇦🇱 Albania (Shqipëri)+355' },
            // ... (copie TODOS os países do portal.js do admin – a lista completa)
            { code: 'outro', label: '🌎 Outro', name: '🌎 Outro país' }
        ];

        // ---------- Estado ----------
        const params = new URLSearchParams(window.location.search);
        const eventoToken = params.get('token');
        let selectedCountry = countries.find(c => c.code === '55');
        let eventoAtual = null;

        // ---------- Renderizar dropdown ----------
        function renderOptions() {
            const container = document.getElementById('customOptions');
            if (!container) return;
            container.innerHTML = countries.map(c =>
                `<div class="custom-option${c.code === selectedCountry.code ? ' selected' : ''}" data-code="${c.code}" data-label="${c.label}">${c.name}</div>`
            ).join('');
            document.querySelectorAll('#customOptions .custom-option').forEach(opt => {
                opt.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const code = this.dataset.code;
                    const label = this.dataset.label;
                    selectedCountry = countries.find(c => c.code === code);
                    document.getElementById('customSelect').textContent = label;
                    container.classList.remove('active');
                    renderOptions();
                    document.getElementById('portalWhatsApp').value = '';
                    document.getElementById('erroWhatsapp').style.display = 'none';
                });
            });
        }

        document.getElementById('customSelect').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('customOptions').classList.toggle('active');
        });
        document.addEventListener('click', () => {
            document.getElementById('customOptions').classList.remove('active');
        });

        renderOptions();

        // ---------- Carregar evento ----------
        async function carregarEvento() {
            if (!eventoToken) {
                document.getElementById('portalLogoGrande').innerHTML = '<span style="font-size:48px;">🎪</span>';
                return;
            }
            const { data, error } = await supabaseClient
                .from('eventos')
                .select('*')
                .eq('token', eventoToken)
                .single();

            if (error || !data) {
                document.getElementById('portalLogoGrande').innerHTML = '<span style="font-size:48px;">🎪</span>';
                return;
            }

            eventoAtual = data;

            // Logo
            const logoGrande = document.getElementById('portalLogoGrande');
            if (data.logo_url && (data.logo_url.startsWith('http') || data.logo_url.startsWith('data:'))) {
                logoGrande.innerHTML = `<img src="${data.logo_url}" style="max-width:100%;max-height:100%;object-fit:contain;" onerror="this.style.display='none'">`;
            } else {
                logoGrande.innerHTML = '<span style="font-size:48px;">🎪</span>';
            }

            // Patrocinadores
            const faixa = document.getElementById('carrosselFaixa');
            let logos = data.patrocinadores_logos;
            if (typeof logos === 'string') {
                try { logos = JSON.parse(logos); } catch(e) { logos = []; }
            }
            const logosValidos = Array.isArray(logos) ? logos.filter(url => typeof url === 'string' && url.length > 20 && (url.startsWith('http') || url.startsWith('data:'))) : [];
            if (faixa) {
                if (logosValidos.length > 4) {
                    faixa.innerHTML = [...logosValidos, ...logosValidos].map(url => `<img src="${url}" alt="Patrocinador" onerror="this.style.display='none'">`).join('');
                    faixa.style.animation = 'scrollPatrocinadores 20s linear infinite';
                } else if (logosValidos.length > 0) {
                    faixa.innerHTML = logosValidos.map(url => `<img src="${url}" alt="Patrocinador" onerror="this.style.display='none'">`).join('');
                    faixa.style.animation = 'none';
                } else {
                    faixa.innerHTML = '';
                }
            }
        }

        carregarEvento();

        // ---------- Validações ----------
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        function validarEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
        function validarWhatsApp(numero, ddi) {
            const digits = numero.replace(/\D/g, '');
            if (ddi === '55') return digits.length === 10 || digits.length === 11;
            return digits.length >= 7 && digits.length <= 15;
        }

        // ---------- Máscara WhatsApp ----------
        function aplicarMascara(event) {
            const input = event.target;
            const ddi = selectedCountry.code;
            if (ddi === '55') {
                let valor = input.value.replace(/\D/g, '');
                if (valor.length > 11) valor = valor.slice(0, 11);
                let formatado = '';
                if (valor.length > 0) formatado += '(' + valor.substring(0,2);
                if (valor.length > 2) formatado += ') ' + valor.substring(2,3);
                if (valor.length > 3) formatado += ' ' + valor.substring(3,7);
                if (valor.length > 7) formatado += '-' + valor.substring(7,11);
                let cursor = input.selectionStart;
                let diff = formatado.length - input.value.length;
                input.value = formatado;
                input.setSelectionRange(cursor + diff, cursor + diff);
            } else {
                let digits = input.value.replace(/\D/g, '');
                if (digits.length > 15) digits = digits.slice(0, 15);
                input.value = digits;
            }
        }
        document.getElementById('portalWhatsApp').addEventListener('input', aplicarMascara);

        // ---------- Conectar ----------
        async function conectar() {
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

            const nome = document.getElementById('portalNome').value.trim();
            const email = document.getElementById('portalEmail').value.trim();
            const ddi = selectedCountry.code;
            const whatsapp = document.getElementById('portalWhatsApp').value.trim();
            const lgpd = document.getElementById('portalLGPD').checked;

            let valido = true;
            if (!nome) { document.getElementById('erroNome')?.style?.display = 'block'; valido = false; }
            if (!validarEmail(email)) { document.getElementById('erroEmail')?.style?.display = 'block'; valido = false; }
            if (whatsapp && !validarWhatsApp(whatsapp, ddi)) {
                const err = document.getElementById('erroWhatsapp');
                if (err) {
                    err.textContent = (ddi === '55') ? 'Número inválido para o Brasil. Use 10 ou 11 dígitos.' : 'Número inválido (mín. 7 dígitos).';
                    err.style.display = 'block';
                }
                valido = false;
            }
            if (!lgpd) { document.getElementById('lgpdError')?.style?.display = 'block'; valido = false; }
            if (!valido) return;

            if (!eventoAtual) {
                alert('Evento não encontrado.');
                return;
            }

            try {
                const { error } = await supabaseClient.from('visitantes').insert([{
                    evento_id: eventoAtual.id,
                    nome: escapeHtml(nome),
                    email: email,
                    whatsapp: whatsapp ? '+' + ddi + ' ' + whatsapp : '(não informado)',
                    acesso: new Date().toISOString(),
                    hora: new Date().getHours(),
                    dispositivo: navigator.userAgent.includes('Mobile') ? 'Mobile' : 'Desktop',
                    ip: '0.0.0.0'
                }]);
                if (error) throw error;
                alert('✅ Conectado!');
                window.location.href = 'https://www.google.com';
            } catch (e) {
                alert('Erro ao registrar: ' + e.message);
            }
        }
    </script>
</body>
</html>
