<div class="top-bar"><h2>⚙️ Configuração</h2></div>
<div class="grid-2">
    <div class="config-section">
        <h4>🏢 Identidade</h4>
        <div class="logo-preview" id="configLogoPreview" onclick="document.getElementById('configLogoUpload').click()"><span>🏢</span></div>
        <input type="file" id="configLogoUpload" accept="image/*" style="display:none;" onchange="previewLogoConfig(event)">
        <div class="input-group"><label>Nome</label><input type="text" id="configEmpresaNome" value="Manos Tech"></div>
        <div class="input-group"><label>E-mail</label><input type="email" id="configEmail" value="contato@manostech.com.br"></div>
    </div>
    <div>
        <div class="config-section">
            <h4>📞 Suporte</h4>
            <div class="input-group"><label>Telefone</label><input type="text" id="configTelefoneSuporte" value="(11) 99999-9999"></div>
        </div>
        <div class="config-section">
            <h4>👤 Admin</h4>
            <div class="input-group"><label>Nome</label><input type="text" id="configAdminNome" value="Carlos Silva"></div>
            <div class="input-group"><label>E-mail</label><input type="email" id="configAdminEmail" value="admin@manostech.com.br"></div>
        </div>
    </div>
</div>
<div style="display:flex;gap:12px;">
    <button class="btn btn-primary" onclick="salvarConfiguracao()" style="max-width:250px;">💾 Salvar</button>
    <button class="btn btn-ghost" onclick="cancelarConfiguracao()" style="max-width:250px;">Cancelar</button>
</div>
